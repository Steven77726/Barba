<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="Baranagera, tequila de luxe contemporaine. Collection exclusive, design sculptural et expérience immersive.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Baranagera">
    <title>Baranagera - L'art de vivre l'expérience tequila</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=24">
    <script type="module" src="app.js?v=24"></script>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="loading-veil" aria-hidden="true"></div>

    <header class="site-header" data-reveal>
      <span class="header-spacer" aria-hidden="true"></span>
      <nav class="nav-links" aria-label="Navigation principale">
        <a href="#collection">Tequila</a>
      </nav>
      <a class="brand brand-logo" href="#collection" aria-label="Barba Negra collection">
        <img src="assets/barba-negra-header-logo.png" alt="Barba Negra">
      </a>
    </header>

    <main id="top" class="product-only-page">
      <section id="collection" class="section collection" aria-labelledby="collection-title">
        <div class="section-kicker" data-reveal>TEQUILA</div>
        <div class="section-head" data-reveal>
          <h1 id="collection-title">Collection</h1>
        </div>

        <div class="product-grid">
          <button class="product-card hamsa-anejo" type="button" data-zoom-title="Casa de Hamsa Añejo" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/casa-de-hamsa-anejo-new-cutout.png" alt="Casa de Hamsa Tequila Añejo">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Casa de Hamsa Añejo</p>
            <p class="product-price">70cL · 40,83€ HT</p>
          </button>

          <button class="product-card hamsa-blanco" type="button" data-zoom-title="Casa de Hamsa Blanco" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/casa-de-hamsa-blanco-new-cutout.png" alt="Casa de Hamsa Tequila Blanco">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Casa de Hamsa Blanco</p>
            <p class="product-price">70cL · 59,90€ HT</p>
          </button>

          <button class="product-card hamsa-reposado" type="button" data-zoom-title="Casa de Hamsa Reposado" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/casa-de-hamsa-reposado-new-cutout.png" alt="Casa de Hamsa Tequila Reposado">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Casa de Hamsa Reposado</p>
            <p class="product-price">70cL · 50,60€ HT</p>
          </button>

          <button class="product-card ramon-anejo" type="button" data-zoom-title="Don Ramón Añejo" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/don-ramon-anejo-new-opaque.png" alt="Don Ramón Tequila Añejo">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Don Ramón Añejo</p>
            <p class="product-price">70cL · 147,90€ HT</p>
          </button>

          <button class="product-card ramon-reposado featured-product" type="button" data-zoom-title="Don Ramón Reposado" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/don-ramon-reposado-new-opaque-cutout.png" alt="Don Ramón Tequila Reposado">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Don Ramón Ceramic Reposado</p>
            <p class="product-price">70cL · 108,95€ HT</p>
          </button>

          <button class="product-card ramon-plata featured-product" type="button" data-zoom-title="Don Ramón Plata" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/don-ramon-plata-new-opaque-cutout.png" alt="Don Ramón Tequila Plata">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Don Ramón Ceramic Plata</p>
            <p class="product-price">70cL · 79,90€ HT</p>
          </button>

          <button class="product-card patron-alto" type="button" data-zoom-title="Patrón El Alto" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/patron-el-alto-new-cutout.png" alt="Patrón El Alto Tequila Reposado">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Patrón El Alto</p>
            <p class="product-price">70cL · 173,90€ HT</p>
          </button>

          <button class="product-card don-julio" type="button" data-zoom-title="Don Julio 1942" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/don-julio-1942-cutout.png" alt="Don Julio 1942 Tequila">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Don Julio 1942</p>
            <p class="product-price">0,7L · 175,90€ HT<br>1,75L · 470€ HT</p>
          </button>

          <button class="product-card azul" type="button" data-zoom-title="Clase Azul" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/azul-cutout.png" alt="Clase Azul Tequila">
            </div>
            <p class="product-family">Tequila</p>
            <p class="product-category">Clase Azul</p>
            <p class="product-price">Prix sur demande</p>
          </button>

          <button class="product-card laurent-perrier" type="button" data-zoom-title="Laurent-Perrier La Cuvée" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/laurent-perrier-brut-cutout.png" alt="Laurent-Perrier La Cuvée Brut">
            </div>
            <p class="product-family">Champagne</p>
            <p class="product-category">Champagne Laurent-Perrier Brut</p>
            <p class="product-price">0,75L · 44,95€ HT</p>
          </button>

          <button class="product-card rose-mademoiselle-mag" type="button" data-zoom-title="Mademoiselle Rosé Gold Magnum" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/rose-mademoiselle-mag-cutout.png" alt="Mademoiselle Rosé Gold Magnum">
            </div>
            <p class="product-family">Rosé</p>
            <p class="product-category">Rose Mademoiselle Magnum 2024</p>
            <p class="product-price">1,5L · 28,90€ HT</p>
          </button>

          <button class="product-card rose-mademoiselle" type="button" data-zoom-title="Mademoiselle Rosé" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/tequila/rose-mademoiselle-cutout.png" alt="Mademoiselle Rosé">
            </div>
            <p class="product-family">Rosé</p>
            <p class="product-category">Rose Mademoiselle 2024</p>
            <p class="product-price">70cL · 13,95€ HT</p>
          </button>

          <button class="product-card beluga-3l" type="button" data-zoom-title="Beluga Noble Jeroboam" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/spirits/beluga-noble-3l.jpeg" alt="Beluga Noble Jeroboam Vodka 3L">
            </div>
            <p class="product-family">Vodka</p>
            <p class="product-category">Beluga Noble Jeroboam</p>
            <p class="product-price">3L · 127,90€ HT</p>
          </button>

          <button class="product-card beluga-6l" type="button" data-zoom-title="Vodka Beluga Noble" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/spirits/beluga-noble-6l.jpg" alt="Vodka Beluga Noble 6L">
            </div>
            <p class="product-family">Vodka</p>
            <p class="product-category">Vodka Beluga Noble</p>
            <p class="product-price">6L · 135€ HT</p>
          </button>

          <button class="product-card santa-teresa-1796" type="button" data-zoom-title="Santa Teresa Solera" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/spirits/santa-teresa-1796.jpg" alt="Santa Teresa Solera Rhum 70cL">
            </div>
            <p class="product-family">Rhum</p>
            <p class="product-category">Santa Teresa Solera</p>
            <p class="product-price">70cL · 31,90€ HT</p>
          </button>

          <button class="product-card santa-teresa-solera" type="button" data-zoom-title="Santa Teresa Solera" data-reveal>
            <div class="product-stage product-photo-stage">
              <img src="assets/spirits/santa-teresa-solera-gran-reserva.png" alt="Santa Teresa Solera Rhum 70cL">
            </div>
            <p class="product-family">Rhum</p>
            <p class="product-category">Santa Teresa Solera</p>
            <p class="product-price">70cL · 31,90€ HT</p>
          </button>

        </div>
      </section>
    </main>

    <dialog class="zoom-dialog" id="zoomDialog" aria-labelledby="zoomTitle">
      <button class="zoom-close" type="button" aria-label="Fermer le zoom">×</button>
      <div class="zoom-content">
        <p class="product-category">Référence</p>
        <h2 id="zoomTitle">Produit</h2>
        <p class="zoom-price" id="zoomPrice"></p>
        <img id="zoomImage" alt="">
      </div>
    </dialog>
  </body>
</html>
